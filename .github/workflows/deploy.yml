name: DevOps Pipeline - Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java app with Maven
        run: cd java-app && mvn package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan

      - name: Install Ansible and rsync
        run: sudo apt update && sudo apt install -y ansible rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/demo-key.pem
          chmod 400 ~/.ssh/demo-key.pem

      - name: Update inventory
        run: |
          echo "[webservers]" > ansible/inventory.ini
          echo "${{ secrets.EC2_HOST }}" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[webservers:vars]" >> ansible/inventory.ini
          echo "ansible_user=ubuntu" >> ansible/inventory.ini
          echo "ansible_ssh_private_key_file=~/.ssh/demo-key.pem" >> ansible/inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini

      - name: Run Ansible setup
        run: cd ansible && ansible-playbook -i inventory.ini setup.yml

      - name: Run Ansible deploy
        run: cd ansible && ansible-playbook -i inventory.ini deploy.yml

      - name: Verify portfolio app
        run: sleep 15 && curl -f http://${{ secrets.EC2_HOST }}:8080

      - name: Verify Java app
        run: curl -f http://${{ secrets.EC2_HOST }}:8081
